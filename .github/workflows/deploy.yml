name: Build and Deploy to Azure
on:
  push:
    branches: [ "master" ] 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        run: az acr login --name ugmchatbotcontainer

      - name: Build and Push Image
        run: |
          docker build -t ugmchatbotcontainer.azurecr.io/raft-mental-health-chatbot:${{ github.sha }} .
          docker push ugmchatbotcontainer.azurecr.io/raft-mental-health-chatbot:${{ github.sha }}

      - name: Deploy to Container App
        uses: azure/container-apps-deploy-action@v1
        with:
          containerAppName: raft-mental-health-chatbot
          resourceGroup: mental-health-ugm-chatbot
          imageToDeploy: ugmchatbotcontainer.azurecr.io/raft-mental-health-chatbot:${{ github.sha }}