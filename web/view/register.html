{% extends "base.html" %}

{% block body %}
<link rel="stylesheet" href="{{ url_for('web.static', filename='css/auth.css') }}">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<div class="auth-page">
    <div class="auth-card">
        <h2 class="auth-title">Daftar — Chatbot Kesehatan Mental</h2>

        <div id="message-box" class="auth-error" style="display: none; padding: 10px; margin-bottom: 15px; border-radius: 4px;"></div>

        <form id="register-form" class="auth-form" novalidate>
            <input type="text" id="username" name="username" placeholder="Nama Lengkap" required>
            <input type="email" id="email" name="email" placeholder="Email" required>
            <div class="password-wrapper" style="position: relative; width: 100%; margin-top: 10px;">
                <input type="password" id="password" name="password" placeholder="Masukkan Kata Sandi" required 
                       style="width: 100%; padding-right: 45px; box-sizing: border-box;">
                <span class="material-icons toggle-password"
                    style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #757575; font-size: 20px; user-select: none;">
                    visibility_off
                </span>
            </div>
            <div class="password-wrapper" style="position: relative; width: 100%; margin-top: 10px;">
                <input type="password" id="confirm" name="confirm" placeholder="Konfirmasi Kata Sandi" required 
                       style="width: 100%; padding-right: 45px; box-sizing: border-box;">
                <span class="material-icons toggle-password"
                    style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #757575; font-size: 20px; user-select: none;">
                    visibility_off
                </span>
            </div>

            <button type="submit" id="submit-btn">Daftar</button>
        </form>

        <div class="auth-bottom">
            Sudah punya akun? <a href="/login">Masuk</a>
        </div>
    </div>
</div>
<script src="{{ url_for('web.static', filename='js/register.js') }}"></script>
{% endblock %}
